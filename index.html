<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery List</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Groceries">
<meta name="theme-color" content="#f7f5f0">
<link rel="apple-touch-icon" href="/icon-512.png">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #f7f5f0; min-height: 100vh; display: flex; justify-content: center; padding: 1.5rem 1rem 5rem; color: #2a2a2a; }
  .app { width: 100%; max-width: 480px; }

  header { margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 2px solid #2a2a2a; }
  h1 { font-size: 1.8rem; font-weight: normal; }
  .subtitle { font-family: 'Courier New', monospace; font-size: 0.72rem; color: #888; margin-top: 0.2rem; letter-spacing: 0.05em; text-transform: uppercase; }
  .sync-status { font-family: 'Courier New', monospace; font-size: 0.68rem; margin-top: 0.25rem; }
  .sync-status.ok { color: #5a9a5a; }
  .sync-status.err { color: #c0392b; }
  .sync-status.loading { color: #aaa; }

  /* RTL toggle row in header */
  .rtl-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; font-family: 'Courier New', monospace; font-size: 0.72rem; color: #888; cursor: pointer; user-select: none; }
  .rtl-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #2a2a2a; cursor: pointer; }

  /* FIX 2: tabs scroll — padding so badge not clipped */
  .tabs-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 1.25rem; padding: 8px 2px 4px; }
  .tabs-scroll::-webkit-scrollbar { display: none; }
  .tabs { display: flex; gap: 0.4rem; width: max-content; }
  .tab { display: flex; flex-direction: column; align-items: center; padding: 0.45rem 0.7rem; border-radius: 8px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; transition: all 0.15s; min-width: 58px; font-family: 'Courier New', monospace; position: relative; }
  .tab .tab-emoji { font-size: 1.3rem; line-height: 1; }
  .tab .tab-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.04em; color: #999; margin-top: 0.2rem; }
  .tab .tab-count { position: absolute; top: -7px; right: -7px; background: #2a2a2a; color: #fff; font-size: 0.6rem; font-family: 'Courier New', monospace; width: 17px; height: 17px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .tab.active { background: #2a2a2a; border-color: #2a2a2a; }
  .tab.active .tab-label { color: #aaa; }

  .add-row { display: flex; gap: 0.4rem; margin-bottom: 1.25rem; }
  .add-row input[type="text"] { flex: 1; }
  .add-row input[type="number"] { width: 55px; flex: none; }
  input[type="text"], input[type="number"] { padding: 0.65rem 0.6rem; border: 1.5px solid #ccc; border-radius: 6px; font-family: inherit; font-size: 1rem; background: #fff; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: #2a2a2a; }
  input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }
  select.unit-select { padding: 0.65rem 0.4rem; border: 1.5px solid #ccc; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 0.8rem; background: #fff; color: #555; outline: none; cursor: pointer; }
  button.add-btn { padding: 0.65rem 1rem; background: #2a2a2a; color: #fff; border: none; border-radius: 6px; font-size: 1.3rem; cursor: pointer; line-height: 1; }
  button.add-btn:hover { background: #444; }
  button.add-btn:disabled { background: #bbb; cursor: default; }

  .list-area { min-height: 120px; }
  ul { list-style: none; }
  li { display: flex; align-items: center; gap: 0.6rem; padding: 0.65rem 0.5rem; border-bottom: 1px solid #ece9e2; }
  li:last-child { border-bottom: none; }
  li.done .item-text { text-decoration: line-through; color: #bbb; }
  input[type="checkbox"] { width: 20px; height: 20px; accent-color: #2a2a2a; cursor: pointer; flex-shrink: 0; }
  .item-text { flex: 1; font-size: 1rem; }

  /* FIX 1: qty badge — darker, more readable */
  .qty-badge { font-family: 'Courier New', monospace; font-size: 0.8rem; background: #2a2a2a; color: #fff; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 4px; white-space: nowrap; }

  button.del-btn { background: none; border: none; color: #bbb; font-size: 1rem; cursor: pointer; padding: 0 0.2rem; line-height: 1; transition: color 0.15s; }
  button.del-btn:hover { color: #c0392b; }
  .empty { text-align: center; padding: 2.5rem 0; color: #ccc; font-style: italic; font-size: 0.95rem; }

  .footer-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #ddd; }
  .count { font-family: 'Courier New', monospace; font-size: 0.72rem; color: #999; }
  button.clear-btn { font-family: 'Courier New', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; background: none; border: 1px solid #ccc; color: #888; padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  button.clear-btn:hover { border-color: #c0392b; color: #c0392b; }

  #install-banner { display: none; position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: #2a2a2a; color: #fff; padding: 0.7rem 1.2rem; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 0.75rem; box-shadow: 0 4px 16px rgba(0,0,0,0.25); z-index: 100; align-items: center; gap: 0.8rem; width: max-content; max-width: 90vw; }
  #install-banner button { background: #fff; color: #2a2a2a; border: none; border-radius: 6px; padding: 0.3rem 0.7rem; cursor: pointer; font-family: inherit; font-size: 0.75rem; font-weight: bold; }
  #install-banner .dismiss { background: none; color: #888; padding: 0; font-size: 1rem; }

  /* FIX 3: RTL mode */
  body.rtl { direction: rtl; }
  body.rtl .tabs { flex-direction: row-reverse; }
  body.rtl .tab .tab-count { right: auto; left: -7px; }
  body.rtl .add-row { flex-direction: row-reverse; }
  body.rtl .add-btn { order: -1; }
  body.rtl li { flex-direction: row-reverse; }
  body.rtl .footer-bar { flex-direction: row-reverse; }
  body.rtl .rtl-row { flex-direction: row-reverse; justify-content: flex-end; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Grocery List</h1>
    <div class="subtitle" id="date-label"></div>
    <div class="sync-status loading" id="sync-status">Connecting…</div>
    <label class="rtl-row">
      <input type="checkbox" id="rtl-toggle"> RTL עברית
    </label>
  </header>

  <div class="tabs-scroll"><div class="tabs" id="tabs"></div></div>

  <div class="add-row">
    <input type="text" id="item-input" placeholder="Add item…" autocomplete="off" disabled />
    <input type="number" id="qty-num" placeholder="qty" min="0" step="any" />
    <select class="unit-select" id="qty-unit"></select>
    <button class="add-btn" id="add-btn" onclick="addItem()" disabled>+</button>
  </div>

  <div class="list-area" id="list-area"><div class="empty">Loading…</div></div>

  <div class="footer-bar">
    <span class="count" id="count-label"></span>
    <button class="clear-btn" onclick="clearDone()">Clear checked</button>
  </div>
</div>

<div id="install-banner">
  🛒 Install as app
  <button id="install-btn">Install</button>
  <button class="dismiss" id="dismiss-btn">✕</button>
</div>

<script>
  const API_KEY = '$2a$10$D34s6zR8WwSewaa69KuNfe2TQK8Yzy8aRHR2vc1L2o6V.5cPmiwm6';
  const BIN_ID_KEY = 'grocery_bin_id_v2';
  const CATS = [
    { key: 'All', emoji: '🛒' }, { key: 'Produce', emoji: '🥦' },
    { key: 'Dairy', emoji: '🥛' }, { key: 'Meat', emoji: '🥩' },
    { key: 'Bakery', emoji: '🍞' }, { key: 'Frozen', emoji: '🧊' },
    { key: 'Pantry', emoji: '🫙' }, { key: 'Drinks', emoji: '🧃' },
    { key: 'Household', emoji: '🧹' }, { key: 'General', emoji: '📦' },
  ];
  let items = [], binId = '6a2b0e08f5f4af5e29e1b12c', saving = false, activeTab = 'All', deferredPrompt = null;

  const UNITS_EN = [
    { value: '', label: '—', group: '' },
    { value: 'g', label: 'g', group: 'Weight' },
    { value: 'kg', label: 'kg', group: 'Weight' },
    { value: 'oz', label: 'oz', group: 'Weight' },
    { value: 'lb', label: 'lb', group: 'Weight' },
    { value: 'ml', label: 'ml', group: 'Volume' },
    { value: 'L', label: 'L', group: 'Volume' },
    { value: 'fl oz', label: 'fl oz', group: 'Volume' },
    { value: 'pcs', label: 'pcs', group: 'Count' },
    { value: 'pack', label: 'pack', group: 'Count' },
    { value: 'can', label: 'can', group: 'Count' },
    { value: 'bag', label: 'bag', group: 'Count' },
    { value: 'box', label: 'box', group: 'Count' },
    { value: 'bottle', label: 'bottle', group: 'Count' },
    { value: 'bunch', label: 'bunch', group: 'Count' },
  ];
  const UNITS_HE = [
    { value: '', label: '—', group: '' },
    { value: 'g', label: 'גרם', group: 'משקל' },
    { value: 'kg', label: 'ק״ג', group: 'משקל' },
    { value: 'oz', label: 'אונקיה', group: 'משקל' },
    { value: 'lb', label: 'ליברה', group: 'משקל' },
    { value: 'ml', label: 'מ״ל', group: 'נפח' },
    { value: 'L', label: 'ליטר', group: 'נפח' },
    { value: 'fl oz', label: 'אונקיית נוזל', group: 'נפח' },
    { value: 'pcs', label: 'יחידות', group: 'כמות' },
    { value: 'pack', label: 'חבילה', group: 'כמות' },
    { value: 'can', label: 'קופסה', group: 'כמות' },
    { value: 'bag', label: 'שקית', group: 'כמות' },
    { value: 'box', label: 'קרטון', group: 'כמות' },
    { value: 'bottle', label: 'בקבוק', group: 'כמות' },
    { value: 'bunch', label: 'אגודה', group: 'כמות' },
  ];

  function buildUnitSelect(isRtl) {
    const units = isRtl ? UNITS_HE : UNITS_EN;
    const sel = document.getElementById('qty-unit');
    const currentVal = sel.value;
    // Build grouped options
    const groups = {};
    units.forEach(u => {
      if (!u.group) return;
      if (!groups[u.group]) groups[u.group] = [];
      groups[u.group].push(u);
    });
    let html = '<option value="">—</option>';
    Object.entries(groups).forEach(([grp, opts]) => {
      html += `<optgroup label="${grp}">`;
      opts.forEach(u => { html += `<option value="${u.value}">${u.label}</option>`; });
      html += '</optgroup>';
    });
    sel.innerHTML = html;
    sel.value = currentVal; // restore selection if still valid
  }

  // RTL toggle — persist preference
  const rtlToggle = document.getElementById('rtl-toggle');
  const isRtlInit = localStorage.getItem('rtl') === '1';
  if (isRtlInit) { document.body.classList.add('rtl'); rtlToggle.checked = true; }
  buildUnitSelect(isRtlInit);

  rtlToggle.addEventListener('change', () => {
    const rtl = rtlToggle.checked;
    document.body.classList.toggle('rtl', rtl);
    localStorage.setItem('rtl', rtl ? '1' : '0');
    buildUnitSelect(rtl);
  });

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'flex';
  });
  document.getElementById('install-btn').addEventListener('click', async () => {
    if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
    document.getElementById('install-banner').style.display = 'none';
  });
  document.getElementById('dismiss-btn').addEventListener('click', () => { document.getElementById('install-banner').style.display = 'none'; });

  function setStatus(msg, type) { const el = document.getElementById('sync-status'); el.textContent = msg; el.className = 'sync-status ' + type; }
  function setReady(ready) { document.getElementById('item-input').disabled = !ready; document.getElementById('add-btn').disabled = !ready; }

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY, ...(options.headers || {}) } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function createBin() {
    const data = await apiFetch('https://api.jsonbin.io/v3/b', { method: 'POST', headers: { 'X-Bin-Name': 'grocery-list', 'X-Bin-Private': 'false' }, body: JSON.stringify({ items: [] }) });
    binId = data.metadata.id; localStorage.setItem(BIN_ID_KEY, binId);
  }

  async function loadFromBin() {
    if (!binId) { await createBin(); return; }
    try {
      const data = await apiFetch(`https://api.jsonbin.io/v3/b/${binId}/latest`);
      items = data.record.items || [];
    } catch (e) {
      if (e.message.includes('404') || e.message.includes('401')) { localStorage.removeItem(BIN_ID_KEY); binId = null; await createBin(); } else throw e;
    }
  }

  async function saveToBin() {
    if (saving) return; saving = true; setStatus('Saving…', 'loading');
    try { await apiFetch(`https://api.jsonbin.io/v3/b/${binId}`, { method: 'PUT', body: JSON.stringify({ items }) }); setStatus('Synced ✓', 'ok'); }
    catch (e) { setStatus('Sync error', 'err'); } finally { saving = false; }
  }

  async function init() {
    try {
      await loadFromBin(); setStatus('Synced ✓', 'ok'); setReady(true);
      renderTabs(); renderList();
      setInterval(async () => { try { await loadFromBin(); renderTabs(); renderList(); } catch {} }, 10000);
    } catch (e) { setStatus('Connection failed: ' + e.message, 'err'); }
  }

  function setTab(key) { activeTab = key; renderTabs(); renderList(); }

  function renderTabs() {
    document.getElementById('tabs').innerHTML = CATS.map(({ key, emoji }) => {
      const count = key === 'All' ? items.filter(i => !i.done).length : items.filter(i => i.cat === key && !i.done).length;
      return `<div class="tab${activeTab === key ? ' active' : ''}" onclick="setTab('${key}')">
        ${count > 0 ? `<div class="tab-count">${count}</div>` : ''}
        <span class="tab-emoji">${emoji}</span><span class="tab-label">${key}</span></div>`;
    }).join('');
  }

  function formatQty(num, unit) { if (!num && !unit) return ''; if (num && unit) return `${num} ${unit}`; return num || unit; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderList() {
    const area = document.getElementById('list-area');
    const totalActive = items.filter(i => !i.done).length, totalDone = items.filter(i => i.done).length;
    document.getElementById('count-label').textContent = `${totalActive} remaining · ${totalDone} checked`;
    const visible = activeTab === 'All' ? items : items.filter(i => i.cat === activeTab);
    const active = visible.filter(i => !i.done), done = visible.filter(i => i.done);
    if (visible.length === 0) { area.innerHTML = '<div class="empty">Nothing here yet.</div>'; return; }
    const renderItems = list => list.map(item => {
      const qty = formatQty(item.qtyNum, item.qtyUnit) || item.qty || '';
      return `<li class="${item.done ? 'done' : ''}"><input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})"><span class="item-text">${esc(item.text)}</span>${qty ? `<span class="qty-badge">${esc(qty)}</span>` : ''}<button class="del-btn" onclick="remove(${item.id})">✕</button></li>`;
    }).join('');
    let html = '';
    if (activeTab === 'All') {
      CATS.filter(c => c.key !== 'All').forEach(({ key, emoji }) => {
        const catActive = active.filter(i => i.cat === key);
        if (catActive.length === 0) return;
        html += `<div style="margin-bottom:1rem"><div style="font-family:'Courier New',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:#aaa;padding:0.3rem 0.5rem 0.2rem">${emoji} ${key}</div><ul>${renderItems(catActive)}</ul></div>`;
      });
    } else { html += `<ul>${renderItems(active)}</ul>`; }
    if (done.length > 0) html += `<div style="margin-top:1rem;opacity:0.6"><div style="font-family:'Courier New',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:#aaa;padding:0.3rem 0.5rem 0.2rem">✓ Done</div><ul>${renderItems(done)}</ul></div>`;
    area.innerHTML = html;
  }

  async function addItem() {
    const input = document.getElementById('item-input'), text = input.value.trim();
    if (!text) return;
    const num = document.getElementById('qty-num').value.trim(), unit = document.getElementById('qty-unit').value;
    const cat = (activeTab === 'All' || activeTab === 'Done') ? 'General' : activeTab;
    items.push({ id: Date.now(), text, qtyNum: num, qtyUnit: unit, cat, done: false });
    input.value = ''; document.getElementById('qty-num').value = '';
    input.focus(); renderTabs(); renderList(); await saveToBin();
  }

  async function toggle(id) { const item = items.find(i => i.id === id); if (item) { item.done = !item.done; renderTabs(); renderList(); await saveToBin(); } }
  async function remove(id) { items = items.filter(i => i.id !== id); renderTabs(); renderList(); await saveToBin(); }
  async function clearDone() { items = items.filter(i => !i.done); renderTabs(); renderList(); await saveToBin(); }

  document.getElementById('item-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  if ('serviceWorker' in navigator) {
    const sw = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));`;
    const blob = new Blob([sw], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob));
  }

  init();
</script>
</body>
</html>
